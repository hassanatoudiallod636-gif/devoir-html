<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Wallet App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="dots">● ● ● ● ● ● ●</div>

      <div class="qr-card">
        <img 
          src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=MON_QR_CODE_123"
          alt="QR Code"
          class="qr-img"
        >
        <div class="qr-text">Scanner</div>
      </div>
    </header>

    <section class="services">
      <div class="service"><span>👤</span>Transfert</div>
      <div class="service"><span>🛒</span>Paiements</div>
      <div class="service"><span>📱</span>Crédit</div>
      <div class="service"><span>🏦</span>Banque</div>
      <div class="service"><span>💳</span>Carte</div>
      <div class="service"><span>🎁</span>Cadeaux</div>
      <div class="service"><span>🔐</span>Coffre</div>
      <div class="service"><span>🚌</span>Transport</div>
    </section>

    <section class="transactions">
      <div class="transaction">
        <div>
          De mbaye F 76 856 54 04
          <span class="date">6 février 2026 à 08:22</span>
        </div>
        <div class="plus">+100F</div>
      </div>

      <div class="transaction">
        <div>
          Retrait
          <span class="date">5 février 2026 à 10:33</span>
        </div>
        <div class="minus">-2.000F</div>
      </div>

      <div class="transaction">
        <div>
          Achat crédit 77 186 10 05
          <span class="date">5 février 2026 à 09:24</span>
        </div>
        <div class="minus">-500F</div>
      </div>
    </section>

  </div>

</body>
</html>
